apiVersion: v1
kind: Secret
metadata:
  name: m8scoretool-secret
  labels:
    app: m8scoretool
type: Opaque
stringData:
  # Change before deploy
  password: "huskers"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m8scoretool
  labels:
    app: m8scoretool
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: m8scoretool
  template:
    metadata:
      labels:
        app: m8scoretool
    spec:
      terminationGracePeriodSeconds: 15
      imagePullSecrets:
        - name: github-container-registry
      containers:
        - name: m8scoretool
          image: ghcr.io/haasb04/m8scoretool:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: UseHttpsRedirection
              value: "false"
            - name: M8SCORETOOL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: m8scoretool-secret
                  key: password
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: m8scoretool
  labels:
    app: m8scoretool
spec:
  selector:
    app: m8scoretool
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: m8scoretool
  labels:
    app: m8scoretool
spec:
  rules:
    - host: m8.brianhaas.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: m8scoretool
                port:
                  number: 80

